<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zombie Shooter (working title)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="damage-vignette" aria-hidden="true"></div>
  <div id="crosshair" class="hidden" aria-hidden="true"></div>
  <div id="countdown" class="hidden" aria-hidden="true">3</div>

  <div id="hud" class="hidden">
    <div class="hud-left">
      <span id="hud-score">SCORE 0</span>
      <span id="hud-mult" class="hud-pill hidden">&times;2</span>
    </div>
    <span id="hud-timer">1:00</span>
  </div>

  <div id="hud-waves" class="hidden">
    <div id="hud-hearts" class="hud-left"></div>
    <span id="hud-kills">KILLS 0</span>
  </div>

  <section id="screen-start" class="screen">
    <h1>Zombie Shooter</h1>
    <p class="subtitle">Pick a mode</p>
    <div class="btn-row">
      <button id="btn-range" type="button">Range</button>
      <button id="btn-waves" type="button">Waves</button>
    </div>
    <p class="controls">Mouse &mdash; look &middot; Left click &mdash; fire &middot; ESC &mdash; pause</p>
    <p id="start-hint" class="hint"></p>
  </section>

  <section id="screen-pause" class="screen hidden">
    <h2>Paused</h2>
    <p id="pause-hint" class="hint">Click anywhere to resume</p>
    <button id="btn-quit" type="button" class="btn-secondary">Quit to menu</button>
  </section>

  <section id="screen-results" class="screen hidden">
    <h2>Time!</h2>
    <p id="results-newbest" class="newbest hidden">NEW BEST!</p>
    <div class="results-stats">
      <p><span>Score</span><strong id="result-score">0</strong></p>
      <p><span>Accuracy</span><strong id="result-accuracy">&mdash;</strong></p>
      <p><span>Best streak</span><strong id="result-streak">0</strong></p>
      <p><span>Personal best</span><strong id="result-best">&mdash;</strong></p>
    </div>
    <button id="btn-again" type="button">Play Again</button>
  </section>

  <section id="screen-gameover" class="screen hidden">
    <h2 class="doom">You Died</h2>
    <div class="results-stats">
      <p><span>Kills</span><strong id="go-kills">0</strong></p>
      <p><span>Survived</span><strong id="go-time">0:00</strong></p>
    </div>
    <button id="btn-retry" type="button">Try Again</button>
    <button id="btn-go-quit" type="button" class="btn-secondary">Quit to menu</button>
  </section>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
